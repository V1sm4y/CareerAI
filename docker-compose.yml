version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careerforge-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-in-production-please}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - DATABASE_URL=sqlite:///./careerforge.db
      - UPLOAD_DIR=uploads
      - LOG_DIR=logs
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:80"]
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
      - backend_db:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: careerforge-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_uploads:
  backend_logs:
  backend_db:
